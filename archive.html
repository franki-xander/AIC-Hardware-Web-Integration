<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historical Data Repository Archives</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>Long-Term <span>Data Archives</span></h1>
        <p class="subtitle">Download historic compiled telemetry sets in standard CSV data structures</p>
      </div>
      <div>
        <a href="/" class="btn">&larr; Back to Fleet Hub</a>
      </div>
    </header>

    <main class="chart-container" style="overflow-x: auto;">
      <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
          <tr style="border-bottom: 2px solid var(--bg-input); color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em;">
            <th style="padding: 0.75rem 0;">Compiled File Name</th>
            <th style="padding: 0.75rem 0;">Data Footprint Size</th>
            <th style="padding: 0.75rem 0; text-align: right;">Action Interface</th>
          </tr>
        </thead>
        <tbody id="archive-table-body">
          <tr>
            <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 3rem 0;">
              Interrogating cloud drive directory tree mappings...
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/archive-fetch.js"></script>
</body>
</html>
