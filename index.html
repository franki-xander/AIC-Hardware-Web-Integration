<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIC Hardware Web Integration</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>AIC Hardware <span>Web Integration</span></h1>
        <p class="subtitle">Real-time status monitoring and decentralized sensor analytics</p>
      </div>
      <div style="display: flex; gap: 0.75rem; align-items: center;">
        <button class="btn btn-primary-action" id="add-sensor-btn">+ Add Sensor</button>
        <a href="archive" class="btn">View Data Archives</a>
      </div>
    </header>

    <main class="grid-fleet" id="fleet-grid">
      <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 3rem 0;">
        <p style="font-size: 1.1rem; letter-spacing: 0.05em;">Initializing device fleet mapping matrix...</p>
      </div>
    </main>
  </div>

  <!-- =====================================================================
       ADD / EDIT SENSOR MODAL — shared for both Add and Edit flows
  ====================================================================== -->
  <div id="sensor-modal-overlay" class="modal-overlay hidden">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="modal-header">
        <h2 id="modal-title">Add Sensor Card</h2>
        <button class="modal-close-btn" id="modal-close-btn" aria-label="Close">&times;</button>
      </div>

      <div class="modal-body">

        <div class="form-group">
          <label for="modal-sensor-select">Sensor ID</label>
          <select id="modal-sensor-select" class="form-control">
            <option value="" disabled selected>Loading sensor IDs from sheet...</option>
          </select>
          <p class="form-hint">Fetched live from your Google Sheet's Telemetry tab.</p>
        </div>

        <div class="form-group">
          <label for="modal-name-input">Display Name</label>
          <input type="text" id="modal-name-input" class="form-control"
                 placeholder="e.g. Main Office Suite" maxlength="40" />
        </div>

        <div class="form-group">
          <label for="modal-desc-input">Description</label>
          <input type="text" id="modal-desc-input" class="form-control"
                 placeholder="e.g. Zone: Server Room — Floor 2" maxlength="60" />
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary-action" id="modal-save-btn">Save Card</button>
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
